<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Студент балансы · Ұйқы vs Сабақ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0B1E3C 0%, #1E3A8A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #F1F5F9;
      line-height: 1.5;
    }

    .app-container {
      max-width: 750px;
      width: 100%;
      margin: 0 auto;
    }

    /* Негізгі карточка */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(37, 99, 235, 0.15) inset;
      transition: all 0.3s ease;
    }

    @media (max-width: 500px) {
      .glass-card { padding: 1.8rem 1.2rem; border-radius: 32px; }
    }

    /* Секция анимациясы */
    .section {
      display: block;
      animation: fadeSlide 0.45s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }

    .hidden-section {
      display: none !important;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #FFFFFF 0%, #C7D2FE 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 650;
      margin-bottom: 1.5rem;
      color: #F1F5F9;
    }

    .subtitle {
      font-size: 1.15rem;
      opacity: 0.85;
      margin-bottom: 2.2rem;
      color: #CBD5E1;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #E2E8F0;
    }

    /* Input */
    .modern-input {
      width: 100%;
      padding: 1rem 1.3rem;
      background: rgba(15, 30, 55, 0.65);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 60px;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: all 0.25s;
      margin-bottom: 1.8rem;
      backdrop-filter: blur(4px);
    }

    .modern-input:focus {
      border-color: #60A5FA;
      background: rgba(20, 40, 70, 0.8);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    .modern-input::placeholder {
      color: #9CA3AF;
      opacity: 0.6;
    }

    /* Батырмалар */
    .btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      padding: 0.95rem 2rem;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.3);
      display: inline-block;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: #2563EB;
      border: 1px solid #3B82F6;
      box-shadow: 0 12px 20px -10px #1E3A8A;
    }

    .btn-primary:hover {
      background: #3B82F6;
      transform: scale(1.02);
      box-shadow: 0 16px 24px -10px #1E40AF;
    }

    .btn-block {
      width: 100%;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Опция батырмалары — дөңгелек карточкалар */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 28px 0 24px;
    }

    .option-btn {
      background: rgba(20, 35, 70, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 50px;
      padding: 1.1rem 1.5rem;
      text-align: left;
      font-size: 1.1rem;
      font-weight: 500;
      color: #F1F5F9;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
      line-height: 1.4;
    }

    .option-btn:hover {
      background: #1E3A8A;
      border-color: #60A5FA;
      transform: translateY(-2px);
    }

    .option-btn.selected {
      background: #2563EB;
      border-color: #93C5FD;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.4), 0 8px 14px rgba(0,0,0,0.2);
    }

    .question-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #F8FAFC;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 5px;
    }

    .progress-indicator {
      font-size: 0.95rem;
      color: #A5B4FC;
      margin-bottom: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Нәтиже */
    .result-box {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 30px;
      padding: 2.2rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      margin: 1.8rem 0;
    }

    .result-emoji {
      font-size: 4.5rem;
      margin-bottom: 0.75rem;
    }

    .result-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .result-desc {
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .thankyou {
      text-align: center;
      margin: 2rem 0 0.5rem;
      font-size: 1.3rem;
      font-weight: 500;
    }

    .error-message {
      color: #FCA5A5;
      font-size: 0.9rem;
      margin-top: -12px;
      margin-bottom: 16px;
      min-height: 24px;
    }

    .text-center { text-align: center; }
    .mt-4 { margin-top: 1.5rem; }

    /* шағын эмодзилер */
    .inline-emoji { font-size: 1.2em; margin-right: 4px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="glass-card">

    <!-- ===== HERO ===== -->
    <div id="heroSection" class="section">
      <h1>Студент өмірі: <br>Ұйқы ма, әлде сабақ па?</h1>
      <div class="subtitle">Тесттен өтіп, өз типіңізді анықтаңыз</div>
      <button class="btn btn-primary btn-block" id="startTestBtn">✨ Тестті бастау</button>
    </div>

    <!-- ===== NAME ===== -->
    <div id="nameSection" class="section hidden-section">
      <h2>👤 Есіміңіз</h2>
      <label for="studentName">Аты-жөніңізді енгізіңіз</label>
      <input type="text" id="studentName" class="modern-input" placeholder="Мысалы: Әлихан Нұрлан" autocomplete="name">
      <div id="nameError" class="error-message"></div>
      <button class="btn btn-primary btn-block" id="continueFromName">Жалғастыру</button>
      <button class="btn btn-block mt-4" id="backToHeroFromName">← Артқа</button>
    </div>

    <!-- ===== QUIZ (10) ===== -->
    <div id="quizSection" class="section hidden-section">
      <div class="progress-indicator" id="progressText">1 / 10 сұрақ</div>
      <div id="questionsContainer"></div>
      <div class="nav-buttons">
        <button class="btn" id="prevQuestionBtn" disabled>← Алдыңғы</button>
        <button class="btn btn-primary" id="nextQuestionBtn">Келесі</button>
      </div>
    </div>

    <!-- ===== RESULT ===== -->
    <div id="resultSection" class="section hidden-section">
      <h2 class="text-center">📋 Сіздің нәтижеңіз</h2>
      <div id="resultDynamic" class="result-box"></div>
      <div id="finalThankYou" class="thankyou">Тестке қатысқаныңызға рақмет! ✨</div>
      <button class="btn btn-primary btn-block mt-4" id="restartTestBtn">🔄 Қайтадан бастау</button>
    </div>

  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 10 СҰРАҚ (әр опция балл әкеледі) ----------
    const questions = [
      {
        text: "Кешкі уақытыңыз қалай өтеді?",
        options: [
          { text: "Телефон қарап, кеш жатам 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Сабақ оқимын 📚", sleep: 0, study: 1, balance: 0 },
          { text: "Демалып, ерте ұйықтаймын 🌙", sleep: 0, study: 0, balance: 1 }
        ]
      },
      {
        text: "Таңертеңгі жағдайыңыз:",
        options: [
          { text: "Тұру өте қиын 😵", sleep: 1, study: 0, balance: 0 },
          { text: "Орташа 😐", sleep: 0, study: 0, balance: 1 },
          { text: "Жеңіл тұрам 😊", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Сабаққа қатысуыңыз:",
        options: [
          { text: "Кейде бармаймын 😅", sleep: 1, study: 0, balance: 0 },
          { text: "Барамын, бірақ шаршаңқы 😴", sleep: 0, study: 0, balance: 1 },
          { text: "Белсенді қатысам 💪", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Телефон қолдану (ұйқы алдында):",
        options: [
          { text: "Көп қолданам 📱", sleep: 1, study: 0, balance: 0 },
          { text: "Аз қолданам", sleep: 0, study: 0, balance: 1 },
          { text: "Мүлде қолданбаймын", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Сіз үшін маңыздырақ:",
        options: [
          { text: "Ұйқы 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Сабақ 📚", sleep: 0, study: 1, balance: 0 },
          { text: "Екеуін тең ұстаймын ⚖️", sleep: 0, study: 0, balance: 1 }
        ]
      },
      {
        text: "Тапсырмаларды орындау үлгерімі:",
        options: [
          { text: "Кейде соңына дейін істемей қалам 😅", sleep: 1, study: 0, balance: 0 },
          { text: "Жасаймын, бірақ баяу 😐", sleep: 0, study: 0, balance: 1 },
          { text: "Уақытымен бітіріп шығам 💪", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Сабақ алдындағы дайындық:",
        options: [
          { text: "Көбіне дайын болмаймын 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Орташа дайындалам ⚖️", sleep: 0, study: 0, balance: 1 },
          { text: "Толық дайын болам 📚", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Демалыс пен уақытты өткізу:",
        options: [
          { text: "Көп ұйықтау немесе телефонда отыру 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Кейде сабақ, кейде демалыс ⚖️", sleep: 0, study: 0, balance: 1 },
          { text: "Сабаққа көңіл бөліп, тиімді өткізу 📚", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Ұйқы режимін сақтау:",
        options: [
          { text: "Жиі бұзылады 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Кейде реттеледі ⚖️", sleep: 0, study: 0, balance: 1 },
          { text: "Дұрыс, тұрақты 💤", sleep: 0, study: 1, balance: 0 }
        ]
      },
      {
        text: "Өзіңді қалай сезінесіз:",
        options: [
          { text: "Шаршаңқы, мотивация төмен 😴", sleep: 1, study: 0, balance: 0 },
          { text: "Орташа ⚖️", sleep: 0, study: 0, balance: 1 },
          { text: "Динамикалы, сергек 📚", sleep: 0, study: 1, balance: 0 }
        ]
      }
    ];

    // жауаптар (индекс бойынша опция индексі)
    let answers = new Array(questions.length).fill(null);
    let currentIndex = 0;
    let studentName = "";

    // DOM
    const hero = document.getElementById('heroSection');
    const nameSec = document.getElementById('nameSection');
    const quizSec = document.getElementById('quizSection');
    const resultSec = document.getElementById('resultSection');
    
    const startBtn = document.getElementById('startTestBtn');
    const continueBtn = document.getElementById('continueFromName');
    const backHeroBtn = document.getElementById('backToHeroFromName');
    const nameInput = document.getElementById('studentName');
    const nameError = document.getElementById('nameError');
    
    const prevBtn = document.getElementById('prevQuestionBtn');
    const nextBtn = document.getElementById('nextQuestionBtn');
    const progressText = document.getElementById('progressText');
    const container = document.getElementById('questionsContainer');
    const resultDiv = document.getElementById('resultDynamic');
    const restartBtn = document.getElementById('restartTestBtn');

    // Бөлім ауыстыру
    function showSection(section) {
      hero.classList.add('hidden-section');
      nameSec.classList.add('hidden-section');
      quizSec.classList.add('hidden-section');
      resultSec.classList.add('hidden-section');
      section.classList.remove('hidden-section');
    }

    // Сұрақты көрсету
    function renderQuestion() {
      const q = questions[currentIndex];
      progressText.innerText = `${currentIndex + 1} / ${questions.length} сұрақ`;
      
      let html = `<div class="question-card"><div class="question-title">${currentIndex+1}. ${q.text}</div><div class="options-grid">`;
      
      q.options.forEach((opt, idx) => {
        const selectedClass = (answers[currentIndex] === idx) ? 'selected' : '';
        html += `<button class="option-btn ${selectedClass}" data-opt-index="${idx}">${opt.text}</button>`;
      });
      
      html += `</div></div>`;
      container.innerHTML = html;

      // click
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.optIndex);
          answers[currentIndex] = idx;
          document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });

      prevBtn.disabled = (currentIndex === 0);
      nextBtn.textContent = (currentIndex === questions.length - 1) ? 'Нәтижені көру ✓' : 'Келесі';
    }

    // Нәтижені есептеу
    function calculateAndShowResult() {
      let sleepScore = 0, studyScore = 0, balanceScore = 0;

      questions.forEach((q, qIdx) => {
        const answerIdx = answers[qIdx];
        if (answerIdx === null) return; // болмауы керек
        const chosen = q.options[answerIdx];
        sleepScore += chosen.sleep || 0;
        studyScore += chosen.study || 0;
        balanceScore += chosen.balance || 0;
      });

      let title = "", emoji = "", desc = "";
      
      if (sleepScore > studyScore && sleepScore > balanceScore) {
        emoji = "😴💤";
        title = "ҰЙҚЫ ӘУЕСҚОЙЫ";
        desc = "Сіз ұйқыны өмір салтына айналдырған жансыз. Демалу маңызды, бірақ сабақты да ұмытпаңыз!";
      } else if (studyScore > sleepScore && studyScore > balanceScore) {
        emoji = "📚✨";
        title = "ЖАУАПТЫ СТУДЕНТ";
        desc = "Сіз білімге және оқуға басымдық бересіз. Тек ұйқыны ұмытпаңыз, сергек ми жақсы жұмыс істейді!";
      } else {
        emoji = "⚖️🌟";
        title = "БАЛАНСТА ҰСТАЙТЫН";
        desc = "Сіз сабақ пен демалысты тең ұстайсыз. Бұл — ең дұрыс жол. Жалғастыра беріңіз!";
      }

      resultDiv.innerHTML = `
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${title}</div>
        <div class="result-desc">${desc}</div>
      `;
    }

    // ---------- ОҚИҒАЛАР ----------
    startBtn.addEventListener('click', () => {
      answers = new Array(questions.length).fill(null);
      currentIndex = 0;
      studentName = "";
      nameInput.value = "";
      nameError.innerText = "";
      showSection(nameSec);
    });

    backHeroBtn.addEventListener('click', () => showSection(hero));

    continueBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) {
        nameError.innerText = "⚠️ Аты-жөніңізді енгізу міндетті";
        return;
      }
      studentName = name;
      nameError.innerText = "";
      answers = new Array(questions.length).fill(null);
      currentIndex = 0;
      renderQuestion();
      showSection(quizSec);
    });

    nextBtn.addEventListener('click', () => {
      if (answers[currentIndex] === null) {
        alert("Өтінеміз, алдымен жауапты таңдаңыз.");
        return;
      }
      if (currentIndex === questions.length - 1) {
        if (answers.includes(null)) {
          alert("Барлық сұрақтарға жауап беріңіз (алдыңғы беттерді тексеріңіз).");
          return;
        }
        calculateAndShowResult();
        showSection(resultSec);
      } else {
        currentIndex++;
        renderQuestion();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    restartBtn.addEventListener('click', () => {
      showSection(hero);
    });

    // Бастапқы көрініс
    showSection(hero);
  })();
</script>
</body>
</html>
